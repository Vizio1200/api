<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Warzone Arsenal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1113;
            color: white;
        }

        .card {
            background: #1c1f23;
            border: 1px solid #333;
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black uppercase italic text-yellow-500 tracking-tighter">Gestión de Arsenal</h1>
            <button onclick="abrirModal()"
                class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded uppercase transition-all">
                + Añadir Nueva Arma
            </button>
        </div>

        <div id="arsenal" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>

    <div id="modalArma" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center p-4">
        <div class="bg-[#1c1f23] border-2 border-yellow-500 p-8 rounded-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-yellow-500 uppercase">Registrar Arma</h2>
            <form id="formArma" class="space-y-4">
                <input type="text" id="nombre" placeholder="Nombre (ej: ISO 45)"
                    class="w-full p-3 bg-gray-800 rounded border border-gray-700 focus:border-yellow-500 outline-none"
                    required>
                <input type="text" id="imagen" placeholder="URL de la imagen"
                    class="w-full p-3 bg-gray-800 rounded border border-gray-700 focus:border-yellow-500 outline-none"
                    required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="dano" placeholder="Daño"
                        class="p-3 bg-gray-800 rounded border border-gray-700 outline-none">
                    <input type="number" id="cadencia" placeholder="Cadencia"
                        class="p-3 bg-gray-800 rounded border border-gray-700 outline-none">
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="cerrarModal()"
                        class="flex-1 bg-gray-700 py-2 rounded font-bold">Cancelar</button>
                    <button type="submit"
                        class="flex-1 bg-yellow-500 text-black py-2 rounded font-bold uppercase">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://api-il9f.onrender.com/api/subfusiles';

        // Cargar Armas (READ)
        async function cargarArmas() {
            const res = await fetch(API_URL);
            const armas = await res.json();
            const contenedor = document.getElementById('arsenal');
            contenedor.innerHTML = '';

            armas.forEach(arma => {
                contenedor.innerHTML += `
                    <div class="card p-4 rounded-xl relative group">
                        <img src="${arma.imagen}" class="w-full h-40 object-cover rounded-lg mb-4 shadow-lg">
                        <h3 class="text-xl font-bold uppercase italic">${arma.nombre}</h3>
                        <p class="text-gray-400 text-sm">Daño: ${arma.dano} | Cadencia: ${arma.cadencia}</p>
                        
                        <button onclick="eliminarArma(${arma.id})" class="absolute top-2 right-2 bg-red-600 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                            🗑️
                        </button>
                    </div>
                `;
            });
        }

        // Crear Arma (CREATE)
        document.getElementById('formArma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevaArma = {
                nombre: document.getElementById('nombre').value,
                imagen: document.getElementById('imagen').value,
                dano: parseInt(document.getElementById('dano').value),
                cadencia: parseInt(document.getElementById('cadencia').value)
            };

            // Aquí faltaría crear la ruta POST en tu backend para que guarde de verdad
            alert("¡Arma registrada con éxito! (Simulado)");
            cerrarModal();
        });

        function abrirModal() { document.getElementById('modalArma').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modalArma').classList.add('hidden'); }

        async function eliminarArma(id) {
            if (confirm('¿Seguro que quieres eliminar esta arma?')) {
                // Aquí llamarías a tu API con DELETE
                alert('Arma ' + id + ' eliminada.');
            }
        }

        cargarArmas();
    </script>
</body>

</html>
