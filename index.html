<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Warzone SMG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1113;
            color: white;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
    </style>
</head>

<body class="p-10">
    <nav class="max-w-6xl mx-auto flex gap-8 mb-10 border-b border-gray-800 pb-4 uppercase font-black italic">
        <a href="index.html" class="text-yellow-500 border-b-2 border-yellow-500">Subfusiles</a>
        <a href="fusiles.html" class="text-gray-500 hover:text-white">Fusiles de Asalto</a>
    </nav>
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-5xl font-black uppercase italic text-yellow-500">Arsenal SMG</h1>
            <button onclick="document.getElementById('m').classList.remove('hidden')"
                class="bg-yellow-500 text-black font-black py-2 px-6 rounded-sm">+ Añadir</button>
        </div>
        <div id="arsenal" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>
    <div id="m" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4">
        <form onsubmit="guardar(event)"
            class="bg-[#1c1f23] p-8 border-2 border-yellow-500 space-y-4 text-black w-full max-w-md">
            <input id="n" placeholder="Nombre" class="w-full p-2" required>
            <input id="i" placeholder="URL Imagen" class="w-full p-2" required>
            <input id="d" type="number" placeholder="Daño" class="w-full p-2" required>
            <input id="c" type="number" placeholder="Cadencia" class="w-full p-2" required>
            <div class="flex gap-4"><button type="button" onclick="document.getElementById('m').classList.add('hidden')"
                    class="flex-1 bg-gray-600 text-white py-2">Cerrar</button>
                <button type="submit" class="flex-1 bg-yellow-500 py-2">Guardar</button>
            </div>
        </form>
    </div>
    <script>
        const API = 'https://api-il9f.onrender.com/api/subfusiles';
        async function cargar() {
            const res = await fetch(API); const datos = await res.json();
            document.getElementById('arsenal').innerHTML = datos.map(a => `
                <div class="bg-gray-900/90 p-5 border-b-4 border-yellow-500">
                    <img src="${a.imagen}" class="w-full h-40 object-cover mb-4">
                    <h3 class="text-xl font-black italic">${a.nombre}</h3>
                    <p class="text-gray-400 text-xs mb-4">Dañ: ${a.dano} | Cad: ${a.cadencia}</p>
                    <button onclick="borrar(${a.id})" class="w-full border border-red-600 text-red-600 py-1 text-xs hover:bg-red-600 hover:text-white">Eliminar</button>
                </div>`).join('');
        }
        async function guardar(e) {
            e.preventDefault();
            await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nombre: document.getElementById('n').value, imagen: document.getElementById('i').value, dano: document.getElementById('d').value, cadencia: document.getElementById('c').value }) });
            document.getElementById('m').classList.add('hidden'); cargar();
        }
        async function borrar(id) { if (confirm('¿Borrar?')) { await fetch(API + '/eliminar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) }); cargar(); } }
        cargar();
    </script>
</body>

</html>
