<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Arsenal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1113;
        }

        .stats-bar {
            height: 8px;
            border-radius: 4px;
            background: #333;
            overflow: hidden;
        }

        .stats-fill {
            height: 100%;
            transition: width 1s ease-in-out;
        }
    </style>
</head>

<body class="text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [armas, setArmas] = useState([]);
            const [cargando, setCargando] = useState(true);

            useEffect(() => {
                fetch('https://api-il9f.onrender.com/api/subfusiles')
                    .then(res => res.json())
                    .then(data => {
                        setArmas(data);
                        setCargando(false);
                    })
                    .catch(err => {
                        console.error("Error al cargar:", err);
                        setCargando(false);
                    });
            }, []);

            return (
                <div class="container mx-auto p-8">
                    <h1 class="text-4xl font-bold mb-8 text-center tracking-widest uppercase text-yellow-500">
                        Warzone Arsenal
                    </h1>

                    {cargando ? (
                        <p class="text-center">Cargando arsenal...</p>
                    ) : (
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {armas.map(arma => (
                                <div key={arma.id} class="bg-[#1c1f23] rounded-xl overflow-hidden border border-gray-800 hover:border-yellow-500 transition-all shadow-2xl">
                                    <img src={arma.imagen} alt={arma.nombre} class="w-full h-48 object-cover opacity-80 hover:opacity-100 transition-opacity" />
                                    <div class="p-6">
                                        <h2 class="text-2xl font-black italic uppercase mb-4">{arma.nombre}</h2>

                                        <Stat label="Daño" value={arma.dano} color="bg-red-500" />
                                        <Stat label="Cadencia" value={arma.cadencia} color="bg-blue-500" />
                                        <Stat label="Movilidad" value={arma.movilidad} color="bg-green-500" />
                                        <Stat label="Alcance" value={arma.alcance} color="bg-yellow-500" />
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function Stat({ label, value, color }) {
            return (
                <div class="mb-3">
                    <div class="flex justify-between text-xs uppercase mb-1 font-bold">
                        <span>{label}</span>
                        <span>{value}</span>
                    </div>
                    <div class="stats-bar">
                        <div class={`stats-fill ${color}`} style={{ width: `${value}%` }}></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
