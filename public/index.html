<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Warzone Arsenal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animación para las barras al cargar */
        .bar-grow {
            transition: width 1s ease-out;
        }
    </style>
</head>

<body class="bg-[#0f1113] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [armas, setArmas] = useState([]);

            useEffect(() => {
                fetch('/api/subfusiles')
                    .then(res => {
                        if (!res.ok) throw new Error('Error en la red');
                        return res.json();
                    })
                    .then(data => setArmas(data))
                    .catch(err => console.error("Error al cargar armas:", err));
            }, []);

            return (
                <div className="container mx-auto p-8">
                    <h1 className="text-4xl font-bold mb-8 text-white text-center tracking-widest uppercase">Warzone Arsenal</h1>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {armas.length === 0 ? (
                            <p className="text-white text-center col-span-3 text-xl animate-pulse">Cargando arsenal...</p>
                        ) : (
                            armas.map(arma => (
                                <div key={arma.id} className="bg-[#1a1d21] p-6 rounded-2xl shadow-2xl border border-gray-700 hover:border-yellow-500 transition-colors">
                                    <img
                                        src={arma.imagen}
                                        alt={arma.nombre}
                                        className="w-full h-44 object-contain mb-4 bg-black/40 rounded-lg p-2"
                                        onError={(e) => e.target.src = 'https://via.placeholder.com/300x150?text=Imagen+No+Disponible'}
                                    />

                                    <h2 className="text-3xl font-black text-yellow-500 uppercase italic mb-1">{arma.nombre}</h2>
                                    <p className="text-gray-400 text-sm mb-6 leading-tight h-10 line-clamp-2">{arma.descripcion}</p>

                                    {/* SECCIÓN DE ESTADÍSTICAS */}
                                    <div className="space-y-3 bg-black/30 p-4 rounded-lg">
                                        <StatBar label="Daño" value={arma.dano || 0} color="bg-red-500" />
                                        <StatBar label="Cadencia" value={arma.cadencia || 0} color="bg-blue-500" />
                                        <StatBar label="Alcance" value={arma.alcance || 0} color="bg-green-500" />
                                        <StatBar label="Movilidad" value={arma.movilidad || 0} color="bg-yellow-500" />
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Componente pequeño para las barras de estadísticas
        function StatBar({ label, value, color }) {
            return (
                <div>
                    <div className="flex justify-between text-[10px] uppercase font-bold text-gray-400 mb-1 tracking-tighter">
                        <span>{label}</span>
                        <span>{value}</span>
                    </div>
                    <div className="w-full bg-gray-900 rounded-full h-1.5 overflow-hidden">
                        <div
                            className={`${color} h-full bar-grow`}
                            style={{ width: `${value}%` }}
                        ></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
