<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Warzone Arsenal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f1113;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .login-card {
            background: rgba(28, 31, 35, 0.95);
            border: 1px solid #333;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

    <div class="login-card p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-yellow-500">
        <h1 class="text-3xl font-black uppercase italic text-center mb-8 tracking-tighter text-yellow-500 text-shadow">
            ACCESO RECLUTA</h1>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase mb-2 text-gray-400 italic">Nombre de Usuario</label>
                <input type="text" id="username" required
                    class="w-full bg-[#2a2e33] border border-gray-700 p-3 rounded focus:outline-none focus:border-yellow-500 transition-colors text-yellow-100 font-bold"
                    autocomplete="off">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase mb-2 text-gray-400 italic">Contraseña</label>
                <input type="password" id="password" required
                    class="w-full bg-[#2a2e33] border border-gray-700 p-3 rounded focus:outline-none focus:border-yellow-500 transition-colors text-yellow-100 font-bold">
            </div>

            <button type="submit"
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black uppercase py-3 rounded transition-all transform hover:scale-105 tracking-widest italic">
                INICIAR SESIÓN
            </button>
        </form>

        <p id="mensaje" class="mt-4 text-center text-sm font-bold uppercase italic"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mensaje = document.getElementById('mensaje');

            try {
                const response = await fetch('https://api-il9f.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // --- LA LLAVE DE SEGURIDAD ---
                    localStorage.setItem('sesion_warzone', 'activa'); // Guarda la sesión
                    localStorage.setItem('usuario_nombre', data.user);

                    mensaje.className = "mt-4 text-center text-sm font-bold text-green-500";
                    mensaje.innerText = "¡ACCESO CONCEDIDO! REDIRIGIENDO...";

                    setTimeout(() => {
                        window.location.href = "public/index.html"; // Redirige al arsenal
                    }, 1500);
                } else {
                    mensaje.className = "mt-4 text-center text-sm font-bold text-red-500";
                    mensaje.innerText = "ERROR: CREDENCIALES NO VÁLIDAS.";
                }
            } catch (err) {
                mensaje.className = "mt-4 text-center text-sm font-bold text-red-500";
                mensaje.innerText = "ERROR AL CONECTAR CON EL SERVIDOR.";
            }
        });
    </script>
</body>

</html>
